# ============================================================
# SkillEvidence — Nginx Production Configuration
#
# Replace PLACEHOLDER_DOMAIN with your actual domain.
# Example: yourdomain.com
#
# Prerequisites:
#   - PHP 8.4-FPM running at /run/php/php8.4-fpm.sock
#   - Certbot certificate obtained at:
#       /etc/letsencrypt/live/PLACEHOLDER_DOMAIN/
#   - App root: /var/www/skillevidence/public
#
# Referenced in: docs/deployment.md § 13 & 14
# ============================================================


# -----------------------------------------------------------
# Global rate limiting zones
# (defined outside server blocks, in http context)
# -----------------------------------------------------------
# Place these in /etc/nginx/nginx.conf inside the http {} block,
# OR in /etc/nginx/conf.d/rate-limits.conf.
#
# limit_req_zone $binary_remote_addr zone=global:10m rate=60r/m;
# limit_req_zone $binary_remote_addr zone=auth:10m   rate=10r/m;
# limit_req_zone $binary_remote_addr zone=api:10m    rate=120r/m;
#
# Uncomment the limit_req directives below once those zones exist.
# -----------------------------------------------------------


# ===========================================================
# SERVER BLOCK 1: HTTP → HTTPS redirect
# ===========================================================
server {
    listen 80;
    listen [::]:80;
    server_name PLACEHOLDER_DOMAIN www.PLACEHOLDER_DOMAIN;

    # Let's Encrypt ACME challenge (Certbot uses this)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}


# ===========================================================
# SERVER BLOCK 2: www → non-www canonical redirect (HTTPS)
# ===========================================================
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.PLACEHOLDER_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/PLACEHOLDER_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/PLACEHOLDER_DOMAIN/privkey.pem;

    return 301 https://PLACEHOLDER_DOMAIN$request_uri;
}


# ===========================================================
# SERVER BLOCK 3: Main HTTPS application
# ===========================================================
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name PLACEHOLDER_DOMAIN;

    root /var/www/skillevidence/public;
    index index.php;

    # ----------------------------------------------------------
    # SSL Certificates (Let's Encrypt via Certbot)
    # ----------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/PLACEHOLDER_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/PLACEHOLDER_DOMAIN/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/PLACEHOLDER_DOMAIN/chain.pem;

    # ----------------------------------------------------------
    # TLS Protocol & Ciphers
    # Only TLS 1.2 and 1.3; no legacy protocols.
    # Cipher list follows Mozilla Intermediate compatibility.
    # ----------------------------------------------------------
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Session resumption — reduces handshake overhead
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;   # ~40,000 sessions
    ssl_session_tickets off;             # forward secrecy: disable tickets

    # OCSP Stapling — prevents client from having to check CRL separately
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ----------------------------------------------------------
    # Security Headers
    # ----------------------------------------------------------

    # HSTS: tell browsers to always use HTTPS for 2 years.
    # includeSubDomains + preload: submit to browser preload lists.
    # REMOVE preload if you have non-HTTPS subdomains.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Prevent clickjacking: only allow framing from same origin
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Prevent MIME sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Control referrer information sent to other origins
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Disable unnecessary browser features
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(self), usb=()" always;

    # Basic XSS protection (legacy browsers; CSP is the real defense)
    add_header X-XSS-Protection "1; mode=block" always;

    # Content Security Policy
    # IMPORTANT: Adjust script-src if you load external scripts (e.g. PayPal SDK).
    # PayPal requires: script-src 'self' https://www.paypal.com https://www.paypalobjects.com
    # Start in report-only mode during initial deploy to catch violations:
    #   add_header Content-Security-Policy-Report-Only "..." always;
    # Then switch to enforcing when stable.
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self' 'unsafe-inline' https://www.paypal.com https://www.paypalobjects.com https://www.sandbox.paypal.com;
        style-src 'self' 'unsafe-inline';
        img-src 'self' data: https:;
        font-src 'self' data:;
        connect-src 'self' https://api.openai.com https://www.paypal.com https://www.paypalobjects.com https://www.sandbox.paypal.com;
        frame-src https://www.paypal.com https://www.sandbox.paypal.com;
        object-src 'none';
        base-uri 'self';
        form-action 'self' https://www.paypal.com;
        upgrade-insecure-requests;
    " always;

    # ----------------------------------------------------------
    # Gzip Compression
    # ----------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        image/svg+xml
        image/x-icon;

    # ----------------------------------------------------------
    # Connection & Request Limits
    # ----------------------------------------------------------
    client_max_body_size 50M;          # must match PHP upload_max_filesize
    client_body_timeout 60s;
    client_header_timeout 60s;
    keepalive_timeout 65s;
    keepalive_requests 100;
    send_timeout 60s;

    # ----------------------------------------------------------
    # Logging
    # ----------------------------------------------------------
    access_log /var/log/nginx/skillevidence_access.log combined buffer=32k flush=5m;
    error_log  /var/log/nginx/skillevidence_error.log warn;

    # ----------------------------------------------------------
    # Deny hidden files (.htaccess, .env, .git, etc.)
    # ----------------------------------------------------------
    location ~ /\.(?!well-known).* {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ----------------------------------------------------------
    # Static Assets — Vite fingerprinted files (immutable cache)
    # Vite appends content hash to filenames: app.ABC123.js
    # Safe to cache forever.
    # ----------------------------------------------------------
    location /build/ {
        expires max;
        add_header Cache-Control "public, immutable, max-age=31536000";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
        try_files $uri =404;
    }

    # Other static assets with shorter cache
    location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|woff|woff2|ttf|eot|pdf)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
        log_not_found off;
        try_files $uri =404;
    }

    # ----------------------------------------------------------
    # PayPal Webhook
    # Pass through cleanly; CSRF is disabled for this route in app.
    # ----------------------------------------------------------
    location /webhooks/paypal {
        try_files $uri /index.php?$query_string;

        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root/index.php;
        include fastcgi_params;
        fastcgi_read_timeout 30s;

        # limit_req zone=api burst=5 nodelay;
    }

    # ----------------------------------------------------------
    # AI Chat Streaming Endpoint (Server-Sent Events)
    # The app streams OpenAI responses via SSE. Buffering must
    # be disabled so chunks reach the client immediately.
    # Adjust the location path to match your actual chat route.
    # ----------------------------------------------------------
    location ~ ^/[a-z]{2}/chat {
        try_files $uri /index.php?$query_string;

        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root/index.php;
        include fastcgi_params;

        # Disable buffering for streaming — critical for SSE
        fastcgi_buffering off;
        fastcgi_read_timeout 120s;
        fastcgi_send_timeout 120s;

        # Proxy-level buffering off too
        proxy_buffering off;
        proxy_cache off;

        # Keep connection alive for streaming
        add_header X-Accel-Buffering "no" always;

        # limit_req zone=api burst=10 nodelay;
    }

    # ----------------------------------------------------------
    # Authentication Routes — stricter rate limiting
    # ----------------------------------------------------------
    location ~ ^/[a-z]{2}/(login|register|password|email/verify) {
        try_files $uri /index.php?$query_string;

        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root/index.php;
        include fastcgi_params;
        fastcgi_read_timeout 60s;

        # limit_req zone=auth burst=5 nodelay;
    }

    # ----------------------------------------------------------
    # PHP-FPM — All Other Requests
    # ----------------------------------------------------------
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param PHP_VALUE "upload_max_filesize=50M \n post_max_size=55M";
        include fastcgi_params;

        # Timeouts: AI grading jobs can hold PHP-FPM up to 60s
        fastcgi_read_timeout 90s;
        fastcgi_send_timeout 90s;
        fastcgi_connect_timeout 10s;

        # Buffer sizes
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;

        # limit_req zone=global burst=20 nodelay;
    }

    # ----------------------------------------------------------
    # Laravel Entry Point — SPA / Inertia routing
    # All non-file requests go through index.php
    # ----------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ----------------------------------------------------------
    # Health Check — Laravel /up endpoint (no logging)
    # ----------------------------------------------------------
    location = /up {
        try_files $uri /index.php?$query_string;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root/index.php;
        include fastcgi_params;
        access_log off;
    }

    # ----------------------------------------------------------
    # Block common exploit probes
    # ----------------------------------------------------------
    location ~* \.(asp|aspx|jsp|cgi|cfm|pl|sh)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* /(wp-admin|wp-login|xmlrpc|phpmyadmin|pma|admin\.php) {
        deny all;
        access_log off;
        log_not_found off;
    }
}
